name: Tier 3 link check

on:
  schedule:
    # Run weekly on Sunday at 02:00 UTC to detect URL drift in Tier 3 sources
    - cron: "0 2 * * 0"
  workflow_dispatch:  # allow manual trigger

jobs:
  link-check:
    name: Verify Tier 3 source URLs are reachable
    runs-on: ubuntu-latest
    continue-on-error: true  # link rot is informational, not a blocker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install httpx
        run: pip install httpx

      - name: Dry-run fetch_tier3 to surface URL drift
        run: |
          python src/tools/fetch_tier3.py --dry-run --workers 4
        # Dry-run mode logs each row's status without downloading content.
        # The job exits 0 even when URLs are stale; downstream graders use the
        # fetch_log.jsonl artifact to triage drift.

      - name: Upload fetch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch_log
          path: data/corpus/tier3_metadata_only/fetch_log.jsonl
          retention-days: 30
