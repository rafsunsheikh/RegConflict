# Zero-shot LLM baseline configuration.
#
# The two open LLM baselines (DeepSeek-R1-Distill-Qwen-1.5B and GLM-4.7-Flash,
# served via llama.cpp 9215) are evaluated under three prompt variants each,
# yielding 6 (model × variant) cells × 2 splits = 12 evaluation runs per
# `scripts/run_zero_shot_baseline.py` invocation.
#
# The verbatim prompt text for each variant lives in src/baselines/zero_shot/
# prompts.py; this config file binds that prompt source to model endpoints and
# inference parameters.
#
# Reproducing the paper:
#   python scripts/run_zero_shot_baseline.py
#
# Headline test split numbers from the v1.0 release:
#   DeepSeek-1.5B (mean of 3 variants): binary F1 = 0.135 ± 0.098
#   GLM-4.7-Flash (mean of 3 variants):  binary F1 = 0.100 ± 0.082

inference_runtime:
  name: llama.cpp
  version: "9215"                 # commit a135ec0ba; see Appendix D
  api: openai_compatible
  reasoning_extraction:
    flag: "--jinja"
    extracted_field: reasoning_content   # <think>...</think> goes here
    answer_field: content                # final JSON answer

models:
  - key: deepseek-r1-distill-qwen-1.5b
    display_name: DeepSeek-R1-Distill-Qwen-1.5B
    family: DeepSeek-R1 reasoning distill on Qwen2.5-Math-1.5B-Instruct
    n_params_approx: 1_500_000_000
    gguf_filename: DeepSeek-R1-Distill-Qwen-1.5B-Q4_K_M.gguf
    sha256: f3bdf9cf31dee4b57ae4e455a1cb0d01b5c2c1b50d72d3112141c195506c2840
    server_url: http://127.0.0.1:8081
    server_alias: deepseek-r1-distill-qwen-1.5b
    n_ctx: 32768

  - key: glm-4.7-flash
    display_name: GLM-4.7-Flash
    family: GLM 4.7 (Z.ai)
    n_params_approx: 30_000_000_000
    gguf_filename: GLM-4.7-Flash-UD-Q4_K_XL.gguf
    sha256: b0d4fbc1211f891b4cfbf2a497160bfe06a49412420068904d426b7a13f4ba7f
    server_url: http://127.0.0.1:8080
    server_alias: glm-4.7-flash
    n_ctx: 65536

variants:
  - key: A
    name: minimal_framing
    description: Task + class definitions, concise
    prompt_source: src.baselines.zero_shot.prompts.VARIANTS.A

  - key: B
    name: detailed_framing
    description: Typology expanded with worked descriptions
    prompt_source: src.baselines.zero_shot.prompts.VARIANTS.B
    notes:
      - max_tokens raised to 8192 (v2) to accommodate GLM reasoning chains;
        the original v1 run at 2048 produced mid-<think> truncation in
        13-17% of GLM predictions and is preserved in the release for
        reproducibility but is NOT the reported v1.0 result.

  - key: C
    name: expert_role_play_letter_typology
    description: Expert role + A/B/C/D letter-coded typology
    prompt_source: src.baselines.zero_shot.prompts.VARIANTS.C
    notes:
      - Same max_tokens=8192 (v2) framing as Variant B.

inference:
  temperature: 0.0              # deterministic for reproducibility
  max_tokens: 8192              # accommodates reasoning chains
  retry_temperatures: [0.3, 0.7]  # escalating retry on JSON parse failure

  # On every parse failure (malformed JSON output) the model is re-queried at
  # the next temperature in retry_temperatures. After exhausting these the
  # prediction is recorded as a parse_failure and counted toward error rate.

  timeout_seconds: 1800         # 30 minutes per call (GLM reasoning at 8192
                                # tokens occasionally takes 5+ minutes)

splits_to_evaluate: [test, gold_iaa]
